<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Ferrule">
  <title>Ferrule</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="0.5" stop-color="#D97706"/>
      <stop offset="1" stop-color="#B45309"/>
    </linearGradient>
    <linearGradient id="bandHi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDE68A" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#FDE68A" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- F monogram: shaft + two arms, in white -->
  <g fill="#FFFFFF">
    <!-- shaft -->
    <rect x="320" y="208" width="160" height="640" rx="24"/>
    <!-- top arm -->
    <rect x="320" y="208" width="440" height="140" rx="24"/>
    <!-- middle arm -->
    <rect x="320" y="470" width="320" height="120" rx="20"/>
  </g>

  <!-- Ferrule: a metallic band wrapping the shaft, just below the top arm -->
  <g>
    <rect x="260" y="372" width="280" height="78" rx="14" fill="url(#band)"/>
    <!-- highlight strip across upper half of band -->
    <rect x="266" y="378" width="268" height="28" rx="10" fill="url(#bandHi)"/>
    <!-- two thin rivet/groove lines -->
    <rect x="260" y="392" width="280" height="3" fill="#92400E" opacity="0.55"/>
    <rect x="260" y="426" width="280" height="3" fill="#92400E" opacity="0.55"/>
  </g>
</svg>
